name: Feature request
description: Suggest an improvement or new workflow
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem should this solve?
      description: Describe the workflow or pain point.
      placeholder: I have many team skills and want to share categories...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would a good solution look like?
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any simpler or different approaches?
    validations:
      required: false
